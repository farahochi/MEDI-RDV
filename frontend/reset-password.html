<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediRDV | Changer le mot de passe</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script type="module" src="js/reset-password.js"></script>
</head>

<body>
  <header class="pageHeader">
    <div class="container pageHeader__row">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="MediRDV">
        <span>MediRDV</span>
      </a>
      <nav class="navLinks">
        <a class="btn btn--ghost" href="patient-dashboard.html">Dashboard patient</a>
        <a class="btn btn--ghost" href="doctor-dashboard.html">Dashboard docteur</a>
        <button class="btn btn--danger" type="button" data-action="logout">Déconnexion</button>
      </nav>
    </div>
  </header>

  <main class="dashboardPage">
    <div class="container dashboardGrid">
      <aside class="sidebarCard">
        <div class="userAvatar">🔐</div>
        <h2 data-user-name>Utilisateur</h2>
        <p class="muted" data-user-email></p>
        <div class="infoList">
          <div class="infoItem"><span>Rôle</span><strong data-user-role></strong></div>
          <div class="infoItem"><span>Ville</span><strong data-user-city></strong></div>
          <div class="infoItem"><span>Spécialité</span><strong data-user-specialty></strong></div>
        </div>
      </aside>

      <section class="contentStack">
        <article class="glassCard">
          <span class="badge">Sécurité</span>
          <h1>Changer le mot de passe</h1>
          <p class="muted">
            Cette page utilise le mot de passe actuel puis le nouveau mot de passe,
            conformément au besoin demandé.
          </p>
        </article>

        <article class="authCard">
          <form id="resetPasswordForm" class="formGrid">
            <label>
              Mot de passe actuel
              <input id="currentPassword" type="password" required />
            </label>

            <label>
              Nouveau mot de passe
              <input id="newPassword" type="password" minlength="6" required />
            </label>

            <label>
              Confirmation du nouveau mot de passe
              <input id="confirmPassword" type="password" minlength="6" required />
            </label>

            <div class="formActions">
              <button class="btn btn--primary" type="submit">Mettre à jour</button>
            </div>

            <p id="resetPasswordMessage" class="message"></p>
          </form>
        </article>
      </section>
    </div>
  </main>
</body>
</html>
